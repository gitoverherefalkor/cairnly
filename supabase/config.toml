
project_id = "pcoyafgsirrznhmdaiji"

[functions.create-checkout]
verify_jwt = false

[functions.payment-success]
verify_jwt = false

# Stripe webhook for refund / dispute events. Auth is via stripe-signature
# header verification inside the function — Stripe never sends a JWT, so
# gateway JWT verification must be off.
[functions.stripe-refund-webhook]
verify_jwt = false

# process-referral-payouts is intentionally NOT listed here — it relies on the
# default verify_jwt = true so the Supabase gateway validates the service_role
# JWT that pg_cron sends in the Authorization header.

[functions.forward-to-n8n]
verify_jwt = true

[functions.verify-access-code]
verify_jwt = false

# Identifies the caller from their JWT inside the function (via getUser), so
# gateway verify_jwt stays off — consistent with the publishable-key note below.
[functions.get-my-access-code]
verify_jwt = false

# Signup happens BEFORE the user has a session, so the function must run
# without JWT verification. Defaults to true otherwise, which broke after
# the anon key migrated from JWT format to sb_publishable_* — the gateway
# now rejects publishable-key Authorization headers with
# UNAUTHORIZED_INVALID_JWT_FORMAT on verify_jwt=true functions.
[functions.signup-with-access-code]
verify_jwt = false

[functions.send-confirmation-email]
verify_jwt = false

[functions.forward-resume-to-n8n]
verify_jwt = true

[functions.analysis-completed]
verify_jwt = false

[functions.parse-resume-ai]
verify_jwt = false

[functions.send-reminder-email]
verify_jwt = false

[functions.search-jobs]
verify_jwt = false

# Called by logged-in users only. JWT is verified inside the function via
# getAuthenticatedUser; gateway verify_jwt stays off to avoid the
# publishable-key rejection issue noted on signup-with-access-code above.
[functions.ensure-referral-code]
verify_jwt = false

[functions.delete-user-data]
verify_jwt = true

[functions.export-user-data]
verify_jwt = true

[auth]
site_url = "https://cairnly.io"
additional_redirect_urls = ["https://www.cairnly.io", "https://atlas-career-chat.lovable.app", "http://localhost:3000"]

[auth.email]
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm Your Atlas Assessment Account"
content_path = "./supabase/templates/confirmation.html"

# Auth hooks are configured in Supabase dashboard
# [auth.hooks.send_email]
# enabled = true
# uri = "https://pcoyafgsirrznhmdaiji.supabase.co/functions/v1/send-confirmation-email"
# secrets = ["SEND_EMAIL_HOOK_SECRET"]

[functions.submit-support-request]
verify_jwt = false

# Transcript cleanup is for logged-in users only — keep the JWT check on so the
# Gemini call cannot be hit anonymously.
[functions.clean-transcript]
verify_jwt = true
