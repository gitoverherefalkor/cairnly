<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bare pre-render fallback title only. Description, canonical, and all
         Open Graph / Twitter tags are intentionally NOT hardcoded here — they
         are owned exclusively by the <Seo> component (react-helmet-async),
         rendered once with site defaults at the App root and overridden
         per-page. Duplicating them here would create two conflicting copies
         of each tag once React mounts, since Helmet can only replace tags it
         rendered itself, not static markup. -->
    <title>Cairnly — Career change clarity. Find a career that fits.</title>
    <meta name="author" content="Cairnly" />

    <link rel="icon" type="image/png" href="/logos/favicon.png" />
    <link rel="apple-touch-icon" href="/logos/apple-touch-icon.png" />
  </head>

  <body>
    <!-- Cairnly runs on a single editorial palette (teal-navy + warm-paper cream).
         Apply the .dark class before React mounts so the page never flashes
         the un-themed default styles. External file (loaded sync) because the
         CSP does not allow 'unsafe-inline' for script-src. -->
    <script src="/theme-init.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
