name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: pcoyafgsirrznhmdaiji
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no access token configured
        if: env.SUPABASE_ACCESS_TOKEN == ''
        run: |
          echo "::warning::SUPABASE_ACCESS_TOKEN secret is not set — skipping deploy."
          echo "To enable auto-deploy, add the secret at:"
          echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
          exit 0

      - name: Set up Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy all Edge Functions
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID" --use-api
