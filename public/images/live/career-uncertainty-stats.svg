<svg viewBox="0 0 1200 665" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Helvetica Neue', Arial, sans-serif">
  <title>The eight findings — career uncertainty stat grid</title>
  <desc>Eight sourced statistics on burnout, engagement, wellbeing, career regret and the future of work.</desc>

  <rect x="0" y="0" width="1200" height="665" fill="#FAF5E8"/>

  <text x="40" y="46" fill="#2A9D9D" font-size="15" font-weight="700" letter-spacing="2.5">THE EIGHT FINDINGS</text>
  <text x="38" y="102" fill="#213F4F" font-size="42" font-weight="700">If you only read this part.</text>

  <rect x="20" y="150" width="1160" height="454" rx="14" fill="#FCF8EE" stroke="#E7DEC9" stroke-width="1"/>
  <line x1="310" y1="168" x2="310" y2="586" stroke="#E7DEC9" stroke-width="1"/>
  <line x1="600" y1="168" x2="600" y2="586" stroke="#E7DEC9" stroke-width="1"/>
  <line x1="890" y1="168" x2="890" y2="586" stroke="#E7DEC9" stroke-width="1"/>
  <line x1="40" y1="377" x2="1160" y2="377" stroke="#E7DEC9" stroke-width="1"/>

  <!-- Row 1 -->
  <g>
    <text x="48" y="212" fill="#C1841A" font-size="40" font-weight="700">1 in 4</text>
    <text x="48" y="248" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="48" dy="0">Dutch workers aged 25 to 34 report</tspan>
      <tspan x="48" dy="21">burn-out complaints. 1 in 5 across</tspan>
      <tspan x="48" dy="21">all ages.</tspan>
    </text>
    <line x1="48" y1="318" x2="282" y2="318" stroke="#E7DEC9" stroke-width="1"/>
    <text x="48" y="337" fill="#9C9384" font-size="12.5" font-style="italic">NEA / CBS-TNO 2024</text>
  </g>

  <g>
    <text x="338" y="212" fill="#C1841A" font-size="40" font-weight="700">Just 13%</text>
    <text x="338" y="248" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="338" dy="0">Of European employees are engaged</tspan>
      <tspan x="338" dy="21">at work. 20% worldwide.</tspan>
    </text>
    <line x1="338" y1="318" x2="572" y2="318" stroke="#E7DEC9" stroke-width="1"/>
    <text x="338" y="337" fill="#9C9384" font-size="12.5" font-style="italic">
      <tspan x="338" dy="0">Gallup, State of the Global</tspan>
      <tspan x="338" dy="15">Workplace 2026</tspan>
    </text>
  </g>

  <g>
    <text x="628" y="212" fill="#C1841A" font-size="40" font-weight="700">40%</text>
    <text x="628" y="248" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="628" dy="0">Of workers felt a lot of stress</tspan>
      <tspan x="628" dy="21">yesterday. Just 34% are thriving</tspan>
      <tspan x="628" dy="21">in life.</tspan>
    </text>
    <line x1="628" y1="318" x2="862" y2="318" stroke="#E7DEC9" stroke-width="1"/>
    <text x="628" y="337" fill="#9C9384" font-size="12.5" font-style="italic">Gallup 2026</text>
  </g>

  <g>
    <text x="918" y="212" fill="#C1841A" font-size="40" font-weight="700">Two thirds</text>
    <text x="918" y="248" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="918" dy="0">Of workers have career regrets.</tspan>
      <tspan x="918" dy="21">Half regret the career they chose.</tspan>
    </text>
    <line x1="918" y1="318" x2="1152" y2="318" stroke="#E7DEC9" stroke-width="1"/>
    <text x="918" y="337" fill="#9C9384" font-size="12.5" font-style="italic">
      <tspan x="918" dy="0">Resume Now, International</tspan>
      <tspan x="918" dy="15">Career Regrets 2024</tspan>
    </text>
  </g>

  <!-- Row 2 -->
  <g>
    <text x="48" y="439" fill="#C1841A" font-size="40" font-weight="700">1 in 3</text>
    <text x="48" y="475" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="48" dy="0">Dutch students regret their study</tspan>
      <tspan x="48" dy="21">choice. 35% of US graduates would</tspan>
      <tspan x="48" dy="21">now choose a different field.</tspan>
    </text>
    <line x1="48" y1="545" x2="282" y2="545" stroke="#E7DEC9" stroke-width="1"/>
    <text x="48" y="564" fill="#9C9384" font-size="12.5" font-style="italic">Studiekeuze123 2021 · Federal Reserve 2024</text>
  </g>

  <g>
    <text x="338" y="439" fill="#C1841A" font-size="40" font-weight="700">9 out of 10</text>
    <text x="338" y="475" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="338" dy="0">Gen Z &amp; Millennials say purpose</tspan>
      <tspan x="338" dy="21">matters more than promotion. Only</tspan>
      <tspan x="338" dy="21">6% want to "become a leader."</tspan>
    </text>
    <line x1="338" y1="545" x2="572" y2="545" stroke="#E7DEC9" stroke-width="1"/>
    <text x="338" y="564" fill="#9C9384" font-size="12.5" font-style="italic">Deloitte Gen Z &amp; Millennial Survey 2025</text>
  </g>

  <g>
    <text x="628" y="439" fill="#C1841A" font-size="40" font-weight="700">39%</text>
    <text x="628" y="475" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="628" dy="0">Of existing skills will be transformed</tspan>
      <tspan x="628" dy="21">or outdated by 2030. 59% of workers</tspan>
      <tspan x="628" dy="21">need retraining.</tspan>
    </text>
    <line x1="628" y1="545" x2="862" y2="545" stroke="#E7DEC9" stroke-width="1"/>
    <text x="628" y="564" fill="#9C9384" font-size="12.5" font-style="italic">WEF Future of Jobs Report 2025</text>
  </g>

  <g>
    <text x="918" y="439" fill="#C1841A" font-size="40" font-weight="700">90 thousand</text>
    <text x="918" y="475" fill="#2E4A5A" font-size="15" font-weight="500">
      <tspan x="918" dy="0">Hours of your life you'll spend at</tspan>
      <tspan x="918" dy="21">work. A third of your waking adult</tspan>
      <tspan x="918" dy="21">life.</tspan>
    </text>
    <line x1="918" y1="545" x2="1152" y2="545" stroke="#E7DEC9" stroke-width="1"/>
    <text x="918" y="564" fill="#9C9384" font-size="12.5" font-style="italic">Pryce-Jones / Naber, Gettysburg College</text>
  </g>

  <text text-anchor="middle" x="600" y="646" fill="#9C9384" font-size="14">Read the full report at <tspan fill="#2A9D9D" font-weight="700">cairnly.io/journal</tspan></text>
</svg>
